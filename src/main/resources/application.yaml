server:
  port: 8081

spring:
  application:
    name: customer-api-spring

  datasource:
    url: jdbc:mysql://localhost:3306/db_customers?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: app_user
    password: A9s!4rT7$kPqZ2vB
    hikari:
      pool-name: RestDB-Pool
      maximum-pool-size: 5
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false

  jpa:
    open-in-view: true
    database: mysql
    hibernate:
      ddl-auto: validate
      properties:
        hibernate:
          show-sql: true
          format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

logging:
  level:
    com.juhmaran.customerapi: debug # em prod = info
    root: info
    sql: trace
    org.hibernate.orm.jdbc.bind: trace